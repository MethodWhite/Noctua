# Labeler v6 config — each label maps to changed-files patterns
# Docs: https://github.com/actions/labeler

core:
  - changed-files:
      - any-glob-to-any-file: core/**/*

loader:
  - changed-files:
      - any-glob-to-any-file: loaders/**/*

module:
  - changed-files:
      - any-glob-to-any-file: modules/**/*

analyzer:
  - changed-files:
      - any-glob-to-any-file: analyzer/**/*

pipeline:
  - changed-files:
      - any-glob-to-any-file: pipeline.py

test:
  - changed-files:
      - any-glob-to-any-file: tests/**/*

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
          - setup.py
          - pyproject.toml

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**/*
          - README.md
          - CONTRIBUTING.md
          - CHANGELOG.md
          - SECURITY.md
          - CODE_OF_CONDUCT.md
