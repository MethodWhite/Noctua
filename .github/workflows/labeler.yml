# Labeler — Etiqueta PRs automáticamente según archivos modificados
# Docs: https://github.com/actions/labeler
# NOTA: Temporalmente en pull_request para migrar v5→v6.
#       Después de merge, volver a pull_request_target.

name: Labeler

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler-config.yml
