# PR Review — Auto-mergea PRs de solo configuración y dependencias

name: PR Review

on:
  pull_request_target:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-config:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check if only .github/ files changed
        id: check
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$CHANGED"
          ONLY_CONFIG=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              .github/*) ;;
              *) ONLY_CONFIG=false; break ;;
            esac
          done <<< "$CHANGED"
          echo "only_config=$ONLY_CONFIG" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.check.outputs.only_config == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --subject "$PR_TITLE"

  auto-merge-deps:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify only safe dependency updates
        id: verify
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$CHANGED"
          SAFE=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              .github/workflows/*.yml) ;;
              .github/dependabot.yml) ;;
              requirements/*.txt) ;;
              */pyproject.toml) ;;
              */Cargo.toml) ;;
              *) SAFE=false; break ;;
            esac
          done <<< "$CHANGED"
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for dependabot
        if: steps.verify.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --subject "$PR_TITLE"
